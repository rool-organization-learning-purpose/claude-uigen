# WARNING: This workflow runs Claude on CI failure logs and pushes fixes.
# It is restricted to same-repo PRs only (no forks) to avoid untrusted code execution.
name: Claude CI Auto-Fix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  auto-fix:
    # Only run on same-repo PRs that failed; skip forks and the fix branch itself
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      !startsWith(github.event.workflow_run.head_branch, 'claude-auto-fix-ci-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Configure git
        run: |
          git config user.name  "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"
          git checkout -b "claude-auto-fix-ci-${{ github.event.workflow_run.head_sha }}"

      - name: Get failed job logs
        id: logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FAILED=$(gh run view ${{ github.event.workflow_run.id }} \
            --repo ${{ github.repository }} --json jobs \
            --jq '[.jobs[] | select(.conclusion=="failure") | .name] | join(", ")')
          echo "failed_jobs=$FAILED" >> "$GITHUB_OUTPUT"

          gh run view ${{ github.event.workflow_run.id }} \
            --repo ${{ github.repository }} --log-failed > /tmp/ci-failure.log 2>&1 || true

      - name: Fix CI failures with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            The CI workflow failed on branch ${{ github.event.workflow_run.head_branch }}.
            Failed jobs: ${{ steps.logs.outputs.failed_jobs }}

            Error logs:
            $(cat /tmp/ci-failure.log | tail -200)

            Analyse the failures, fix the root cause in the source files, then run:
              git add -A && git commit -m "fix: auto-fix CI failures"
              git push origin HEAD

          claude_args: |
            --allowedTools "Edit,Read,Write,Bash(git *),Bash(npm install),Bash(npm run build),Bash(npm run lint:*),Bash(npm run test:*),Bash(npx *)"
